<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Login | AgriDirect Market</title>
            <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="bg-white shadow-lg rounded-xl w-full max-w-md p-8">
        <h2 class="text-2xl font-bold text-center text-green-700">AgriDirect Login</h2>

        {% if error %}
        <p class="text-red-500 text-sm mt-4 text-center">{{ error }}</p>
        {% endif %}

        <form method="POST" class="mt-6 space-y-4">
            <input type="email" name="email" required placeholder="Email"
                class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400">

            <input type="password" name="password" required placeholder="Password"
                class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400">

            <button type="submit" class="w-full bg-green-600 text-white py-2 rounded-lg hover:bg-green-700 transition">
                Login
            </button>
        </form>

        <p class="text-sm text-center mt-4">
            Don’t have an account?
            <a href="/auth/register" class="text-green-600 font-semibold">Register</a>
        </p>
    </div>

</body>

</html>
