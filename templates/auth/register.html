<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Register | AgriDirect Market</title>
           <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="bg-white shadow-lg rounded-xl w-full max-w-md p-8">
        <h2 class="text-2xl font-bold text-center text-green-700">Create Account</h2>

        {% if error %}
        <p class="text-red-500 text-sm mt-4 text-center">{{ error }}</p>
        {% endif %}

        <form method="POST" class="mt-6 space-y-4">
            <input type="text" name="name" required placeholder="Full Name" class="w-full px-4 py-2 border rounded-lg">

            <input type="email" name="email"
                 pattern="^[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$"
                 title="Enter valid lowercase email"
                 required
                            class="w-full px-4 py-2 border rounded-lg">

            <select name="role" required class="w-full px-4 py-2 border rounded-lg">
                <option value="">Select Role</option>
                <option value="customer">Customer</option>
                <option value="farmer">Farmer</option>
            </select>

            <input type="password" name="password" required placeholder="Password"
                class="w-full px-4 py-2 border rounded-lg">

            <button type="submit" class="w-full bg-green-600 text-white py-2 rounded-lg hover:bg-green-700 transition">
                Register
            </button>
        </form>

        <p class="text-sm text-center mt-4">
            Already registered?
            <a href="/auth/login" class="text-green-600 font-semibold">Login</a>
        </p>
    </div>

</body>

</html>
