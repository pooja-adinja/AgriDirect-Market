{% extends "base.html" %}

{% block title %}Farmer Dashboard{% endblock %}
{% block page_title %}Manage Inventory{% endblock %}

{% block content %}

<body class="bg-gray-100 p-8">

    <div class="max-w-5xl mx-auto bg-white p-6 rounded-xl shadow">
        <h2 class="text-2xl font-bold text-green-700 mb-6">Inventory Management</h2>

        <table class="w-full border">
            <thead class="bg-gray-100">
                <tr>
                    <th class="p-3">Product</th>
                    <th>Stock</th>
                    <th>Update</th>
                </tr>
            </thead>

            <tbody>
                {% for p in products %}
                <tr class="border-t">
                    <td class="p-3">{{ p.title }}</td>
                    <td class="text-center font-semibold">{{ p.quantity }}</td>
                    <td class="text-center">
                        <button onclick="openModal({{ p.id }})" class="bg-blue-600 text-white px-3 py-1 rounded">
                            Update Stock
                        </button>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <!-- MODAL -->
    <div id="modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">

        <div class="bg-white p-6 w-96 rounded-xl">
            <h3 class="text-xl font-bold mb-4">Update Inventory</h3>

            <form method="POST" action="/farmer/inventory/update">
                <input type="hidden" name="product_id" id="product_id">

                <select name="action" class="w-full border p-2 mb-2" required>
                    <option value="">Select Action</option>
                    <option value="add">Add Stock</option>
                    <option value="reduce">Reduce Stock</option>
                    <option value="adjust">Set Exact Stock</option>
                </select>

                <input type="number" name="quantity" required class="w-full border p-2 mb-2" placeholder="Quantity">

                <input type="text" name="remarks" class="w-full border p-2 mb-4" placeholder="Remarks (optional)">

                <div class="flex justify-end space-x-2">
                    <button type="button" onclick="closeModal()" class="border px-3 py-1 rounded">
                        Cancel
                    </button>
                    <button class="bg-green-600 text-white px-3 py-1 rounded">
                        Save
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function openModal(productId) {
            document.getElementById("product_id").value = productId;
            document.getElementById("modal").classList.remove("hidden");
        }
        function closeModal() {
            document.getElementById("modal").classList.add("hidden");
        }
    </script>

</body>

{% endblock %}
